<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asia Mart — Online Order</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+Thai:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf9f6;
    --surface: #ffffff;
    --border: #e8e4dc;
    --text: #1a1814;
    --muted: #7a7570;
    --accent: #c84b2f;
    --accent-light: #fdf0ed;
    --success: #2d7a4f;
    --success-light: #edf7f2;
    --gold: #b8860b;
  }

  body {
    font-family: 'Noto Sans KR', 'Noto Sans Thai', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* LANG SWITCHER */
  .lang-switcher {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .lang-btn {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 4px 9px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    letter-spacing: 0.03em;
  }
  .lang-btn.active { background: #fff; color: var(--text); }
  .lang-btn:hover:not(.active) { background: rgba(255,255,255,0.25); }

  /* HEADER */
  header {
    background: var(--text);
    color: #fff;
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    letter-spacing: 0.02em;
    color: #fff;
  }
  .logo span { color: #e8a87c; }
  .header-cart {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 100px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .header-cart:hover { opacity: 0.85; }
  .cart-count {
    background: #fff;
    color: var(--accent);
    font-weight: 700;
    font-size: 11px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* HERO */
  .hero {
    background: var(--text);
    color: #fff;
    padding: 40px 24px 48px;
    text-align: center;
  }
  .hero-sub { font-size: 12px; letter-spacing: 0.12em; color: #e8a87c; text-transform: uppercase; margin-bottom: 12px; }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(28px, 5vw, 44px); line-height: 1.2; margin-bottom: 12px; }
  .hero p { font-size: 14px; color: #aaa; max-width: 400px; margin: 0 auto; }

  /* CATEGORY TABS */
  .tabs-wrap {
    position: sticky;
    top: 60px;
    z-index: 90;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tabs {
    display: flex;
    padding: 0 16px;
    min-width: max-content;
  }
  .tab {
    padding: 14px 18px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .tab:hover:not(.active) { color: var(--text); }

  /* MAIN */
  main { max-width: 680px; margin: 0 auto; padding: 20px 16px 120px; }

  .category-section { display: none; }
  .category-section.active { display: block; }

  .section-title {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 24px 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* PRODUCT CARD */
  .product-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 10px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .product-card.has-qty {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .product-thumb {
    width: 72px;
    height: 72px;
    border-radius: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    flex-shrink: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }
  .product-body { flex: 1; min-width: 0; }
  .product-name { font-size: 14px; font-weight: 500; margin-bottom: 5px; line-height: 1.3; }
  .product-prices { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .price-tag {
    font-size: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 2px 10px;
    color: var(--muted);
  }
  .price-tag.deal {
    background: var(--success-light);
    border-color: #b2dbc5;
    color: var(--success);
    font-weight: 500;
  }
  .deal-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 4px;
    padding: 2px 7px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .qty-area {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 4px;
  }
  .qty-controls {
    display: flex;
    align-items: center;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: var(--bg);
  }
  .qty-btn {
    width: 32px;
    height: 32px;
    border: none;
    background: none;
    font-size: 18px;
    cursor: pointer;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
  }
  .qty-btn:hover { background: var(--border); }
  .qty-input {
    width: 40px;
    height: 32px;
    border: none;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    text-align: center;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    background: #fff;
    color: var(--text);
    -moz-appearance: textfield;
  }
  .qty-input::-webkit-outer-spin-button,
  .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .item-subtotal {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    margin-left: auto;
    min-width: 72px;
    text-align: right;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .item-subtotal.visible { opacity: 1; }

  /* STICKY FOOTER */
  .order-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 200;
  }
  .order-bar-info { flex: 1; }
  .order-bar-label { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .order-bar-total { font-size: 22px; font-weight: 700; color: var(--text); }
  .order-bar-items { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .order-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 14px 28px;
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .order-btn:hover { opacity: 0.9; }
  .order-btn:active { transform: scale(0.97); }

  /* ORDER MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px;
    width: 100%;
    max-width: 680px;
    max-height: 80vh;
    overflow-y: auto;
    transform: translateY(40px);
    transition: transform 0.25s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .modal-title { font-size: 18px; font-weight: 700; }
  .modal-close { background: var(--bg); border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--muted); }
  .modal-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .modal-item:last-child { border-bottom: none; }
  .modal-item-name { color: var(--muted); }
  .modal-item-price { font-weight: 500; }
  .modal-total { display: flex; justify-content: space-between; margin-top: 16px; padding-top: 16px; border-top: 2px solid var(--text); font-size: 18px; font-weight: 700; }
  .confirm-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 16px;
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 20px;
    transition: opacity 0.15s;
  }
  .confirm-btn:hover { opacity: 0.9; }
  .empty-cart { text-align: center; color: var(--muted); padding: 32px 0; font-size: 14px; }

  /* Customer info */
  .customer-form { margin-top: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; color: var(--muted); margin-bottom: 5px; display: block; }
  .form-input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    outline: none;
  }
  .form-input:focus { border-color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo">Asia <span>Mart</span></div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('th')">TH</button>
      <button class="lang-btn" onclick="setLang('ko')">KO</button>
    </div>
    <button class="header-cart" onclick="openModal()">
      🛒 <span data-t="cart">Cart</span>
      <span class="cart-count" id="header-count">0</span>
    </button>
  </div>
</header>

<div class="hero">
  <div class="hero-sub">Fresh from Southeast Asia</div>
  <h1 data-t="hero_title">Authentic Asian<br>Online Order</h1>
  <p data-t="hero_desc">Select quantity to calculate price instantly. Discount applied for 3+ items!</p>
</div>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" onclick="switchTab(this,'frozen')" data-t="cat_frozen">🧊 A Frozen Food</button>
    <button class="tab" onclick="switchTab(this,'noodle')" data-t="cat_noodle">🍜 B Noodles</button>
    <button class="tab" onclick="switchTab(this,'sauce')" data-t="cat_sauce">🥫 C Sauces</button>
    <button class="tab" onclick="switchTab(this,'other')" data-t="cat_other">🧃 D Drinks & More</button>
  </div>
</div>

<main id="main-content"></main>

<div class="order-bar">
  <div class="order-bar-info">
    <div class="order-bar-label" data-t="total_label">Total</div>
    <div class="order-bar-total" id="grand-total">₩0</div>
    <div class="order-bar-items" id="item-summary" data-t="select_items">Please select items</div>
  </div>
  <button class="order-btn" onclick="openModal()" data-t="order_btn">Order Now →</button>
</div>

<div class="modal-overlay" id="modal" onclick="closeOnOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" data-t="order_confirm">Order Summary</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
/* ===================================================
   🌐 LANGUAGE SYSTEM
   =================================================== */
const i18n = {
  en: {

    hero_desc: 'Select quantity to calculate price instantly. Discount applied for 3+ items!',
    cat_frozen: '🧊 A Frozen Food', cat_noodle: '🍜 B Noodles',
    cat_sauce: '🥫 C Sauces', cat_other: '🧃 D Drinks & More',

    hero_desc: 'เลือกจำนวนเพื่อคำนวณราคาทันที ส่วนลดอัตโนมัติเมื่อซื้อ 3 ชิ้นขึ้นไป!',
    cat_frozen: '🧊 A อาหารแช่แข็ง', cat_noodle: '🍜 B เส้นก๋วยเตี๋ยว',
    cat_sauce: '🥫 C ซอสต่างๆ', cat_other: '🧃 D เครื่องดื่ม & อื่นๆ',
    total_label: 'ยอดรวม', select_items: 'กรุณาเลือกสินค้า',

    confirm_btn: 'ยืนยันคำสั่งซื้อ', grand_total: 'ยอดรวม',
    alert_fill: 'กรุณากรอกชื่อและเบอร์โทรศัพท์',
    alert_done: (name, phone) => `✅ สั่งซื้อสำเร็จ!\n\nชื่อ: ${name}\nเบอร์โทร: ${phone}\n\nเราจะติดต่อกลับเร็วๆ นี้ ขอบคุณ!`,
  },
  ko: {
    cart: '장바구니', hero_title: '정통 아시아 식품<br>온라인 주문',
    hero_desc: '수량을 선택하면 금액이 바로 계산됩니다. 3개 이상 구매 시 할인 자동 적용!',
    cat_frozen: '🧊 A 냉동음식', cat_noodle: '🍜 B 면 종류',
    cat_sauce: '🥫 C 각종 소스', cat_other: '🧃 D 음료 및 기타',
    total_label: '합계 금액', select_items: '상품을 선택해 주세요',
    order_btn: '주문하기 →', order_confirm: '주문 확인',
    items_selected: (n) => `${n}종류 선택됨`,
    empty_cart: '장바구니가 비어있어요.<br>상품을 선택해 주세요.',
    field_name: '이름', field_phone: '연락처', field_note: '메모 (선택)',
    ph_name: '홍길동', ph_phone: '010-0000-0000', ph_note: '배달 요청사항 등',
    confirm_btn: '주문 완료하기', grand_total: '합계',
    alert_fill: '이름과 연락처를 입력해 주세요.',
    alert_done: (name, phone) => `✅ 주문이 완료되었습니다!\n\n이름: ${name}\n연락처: ${phone}\n\n곧 연락드리겠습니다. 감사합니다!`,
  }
};

let currentLang = 'en';

function setLang(lang) {
  currentLang = lang;
  const t = i18n[lang];

  // Update all data-t elements
  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.getAttribute('data-t');
    if (t[key] && typeof t[key] === 'string') el.innerHTML = t[key];
  });

  // Update lang buttons
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === lang.toUpperCase());
  });

  // Re-render current tab to update product names
  renderTab(currentTab);
  updateSummary();
}

   ===================================================== */

      { id:'a7', name_en:'A7. Chicken Liver 400g', name_ko:'A7. 닭간 400g',                  emoji:'🐔', image:'', price1:3900, price2:7500,  price3:11000 },
      { id:'a8', name_en:'A8. Chicken Heart 500g', name_ko:'A8. 닭열집 500g',                emoji:'🐔', image:'', price1:3000, price2:7500,  price3:11000 },
      { id:'a9', name_en:'A9. (TBC) 500g', name_ko:'A9. (미확인) 500g',              emoji:'🧊', image:'', price1:3000, price2:7500,  price3:11000 },

const quantities = {};
let currentTab = 'frozen';

function getPrice(item, qty) {
  if (!qty || qty <= 0) return 0;
  // 가격 티어: price1(1개), price2(2개), price3(3개), price5(5개), price10(10개)
  const tiers = [];
  if (item.price10) tiers.push({ qty: 10, price: item.price10 });
  if (item.price5)  tiers.push({ qty: 5,  price: item.price5 });
  if (item.price3)  tiers.push({ qty: 3,  price: item.price3 });
  if (item.price2)  tiers.push({ qty: 2,  price: item.price2 });

  let total = 0, remaining = qty;
  for (const tier of tiers) {
    if (remaining >= tier.qty) {
      const sets = Math.floor(remaining / tier.qty);
      total += sets * tier.price;
      remaining -= sets * tier.qty;
    }
  }
  total += remaining * item.price1;
  return total;
}

function getPriceTags(item) {
  const t = i18n[currentLang];
  const tags = [`<span class="price-tag">1 ${fmt(item.price1)}</span>`];
  if (item.price2)  tags.push(`<span class="price-tag deal">2 ${fmt(item.price2)}</span>`);
  if (item.price3)  tags.push(`<span class="price-tag deal">3 ${fmt(item.price3)}</span>`);
  if (item.price5)  tags.push(`<span class="price-tag deal">5 ${fmt(item.price5)}</span>`);
  if (item.price10) tags.push(`<span class="price-tag deal">10 ${fmt(item.price10)}</span>`);
  return tags.join('');
}

function getItemName(item) {
  if (currentLang === 'ko') return item.name_ko || item.name_en || '';
  return item.name_en || item.name_ko || '';
}

function fmt(n) { return '₩' + n.toLocaleString(); }

function renderTab(tab) {
  const container = document.getElementById('main-content');
  container.innerHTML = '';

  const cat = catalog[tab];
  const section = document.createElement('div');
  section.innerHTML = `<div class="section-title">${cat.emoji} ${cat.label}</div>`;

  cat.items.forEach(item => {
    const qty = quantities[item.id] || 0;
    const subtotal = getPrice(item, qty);
    const displayName = getItemName(item);
    const card = document.createElement('div');
    card.className = 'product-card' + (qty > 0 ? ' has-qty' : '');
    card.id = 'card-' + item.id;
    card.innerHTML = `
      <div class="product-thumb">
        ${item.image
          ? `<img src="${item.image}" alt="${displayName}" style="width:100%;height:100%;object-fit:cover;border-radius:7px;" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
          : ''}
        <span style="display:${item.image ? 'none' : 'flex'};align-items:center;justify-content:center;width:100%;height:100%;font-size:28px;">${item.emoji}</span>
      </div>
      <div class="product-body">
        <div class="product-name">${displayName}</div>
        <div class="product-prices">
          ${getPriceTags(item)}
        </div>
        <div class="qty-area">
          <div class="qty-controls">
            <button class="qty-btn" onclick="changeQty('${item.id}',-1,event)">−</button>
            <input class="qty-input" type="number" min="0" value="${qty}" id="input-${item.id}" onchange="setQty('${item.id}',this.value)" />
            <button class="qty-btn" onclick="changeQty('${item.id}',1,event)">+</button>
          </div>
          <div class="item-subtotal ${qty > 0 ? 'visible' : ''}" id="sub-${item.id}">${qty > 0 ? fmt(subtotal) : ''}</div>
        </div>
      </div>
    `;
    section.appendChild(card);
  });
  container.appendChild(section);
}

function updateCard(id) {
  const qty = quantities[id] || 0;
  const card = document.getElementById('card-' + id);
  const subEl = document.getElementById('sub-' + id);
  const inp = document.getElementById('input-' + id);
  if (!card) return;

  const item = Object.values(catalog).flatMap(c => c.items).find(p => p.id === id);
  const subtotal = getPrice(item, qty);

  if (inp) inp.value = qty;
  if (subEl) {
    subEl.textContent = qty > 0 ? fmt(subtotal) : '';
    subEl.className = 'item-subtotal' + (qty > 0 ? ' visible' : '');
  }
  card.className = 'product-card' + (qty > 0 ? ' has-qty' : '');
}

function updateSummary() {
  const t = i18n[currentLang];
  let grand = 0, count = 0;
  const allItems = Object.values(catalog).flatMap(c => c.items);
  allItems.forEach(item => {
    const qty = quantities[item.id] || 0;
    if (qty > 0) { grand += getPrice(item, qty); count++; }
  });
  document.getElementById('grand-total').textContent = fmt(grand);
  document.getElementById('item-summary').textContent = count > 0 ? t.items_selected(count) : t.select_items;
  document.getElementById('header-count').textContent = count;
}

function changeQty(id, delta, e) {
  e && e.stopPropagation();
  quantities[id] = Math.max(0, (quantities[id] || 0) + delta);
  updateCard(id);
  updateSummary();
}

function setQty(id, val) {
  quantities[id] = Math.max(0, parseInt(val) || 0);
  updateCard(id);
  updateSummary();
}

function switchTab(el, tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentTab = tab;
  renderTab(tab);
}

function openModal() {
  const t = i18n[currentLang];
  const allItems = Object.values(catalog).flatMap(c => c.items);
  const selected = allItems.filter(item => (quantities[item.id] || 0) > 0);
  const body = document.getElementById('modal-body');

  if (selected.length === 0) {
    body.innerHTML = `<div class="empty-cart">${t.empty_cart}</div>`;
  } else {
    let grand = 0;
    const rows = selected.map(item => {
      const qty = quantities[item.id];
      const price = getPrice(item, qty);
      grand += price;
      return `<div class="modal-item">
        <span class="modal-item-name">${item.emoji} ${getItemName(item)} × ${qty}</span>
        <span class="modal-item-price">${fmt(price)}</span>
      </div>`;
    }).join('');

    body.innerHTML = `
      ${rows}
      <div class="modal-total"><span>${t.grand_total}</span><span>${fmt(grand)}</span></div>
      <div class="customer-form">
        <div class="form-group">
          <label class="form-label">${t.field_name}</label>
          <input class="form-input" type="text" id="cust-name" placeholder="${t.ph_name}" />
        </div>
        <div class="form-group">
          <label class="form-label">${t.field_phone}</label>
          <input class="form-input" type="tel" id="cust-phone" placeholder="${t.ph_phone}" />
        </div>
        <div class="form-group">
          <label class="form-label">${t.field_note}</label>
          <input class="form-input" type="text" id="cust-note" placeholder="${t.ph_note}" />
        </div>
      </div>
      <button class="confirm-btn" onclick="confirmOrder()">${t.confirm_btn}</button>
    `;
  }

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function closeOnOverlay(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

function confirmOrder() {
  const t = i18n[currentLang];
  const name = document.getElementById('cust-name')?.value.trim();
  const phone = document.getElementById('cust-phone')?.value.trim();
  if (!name || !phone) { alert(t.alert_fill); return; }
  alert(t.alert_done(name, phone));
  closeModal();
}

renderTab('frozen');
</script>
</body>
</html>
