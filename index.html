<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asia Mart — Online Order</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+Thai:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf9f6;
    --surface: #ffffff;
    --border: #e8e4dc;
    --text: #1a1814;
    --muted: #7a7570;
    --accent: #c84b2f;
    --accent-light: #fdf0ed;
    --success: #2d7a4f;
    --success-light: #edf7f2;
    --gold: #b8860b;
  }

  body {
    font-family: 'Noto Sans KR', 'Noto Sans Thai', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* LANG SWITCHER */
  .lang-switcher {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .lang-btn {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 4px 9px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    letter-spacing: 0.03em;
  }
  .lang-btn.active { background: #fff; color: var(--text); }
  .lang-btn:hover:not(.active) { background: rgba(255,255,255,0.25); }

  /* HEADER */
  header {
    background: var(--text);
    color: #fff;
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    letter-spacing: 0.02em;
    color: #fff;
  }
  .logo span { color: #e8a87c; }
  .header-cart {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 100px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .header-cart:hover { opacity: 0.85; }
  .cart-count {
    background: #fff;
    color: var(--accent);
    font-weight: 700;
    font-size: 11px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* HERO */
  .hero {
    background: var(--text);
    color: #fff;
    padding: 40px 24px 48px;
    text-align: center;
  }
  .hero-sub { font-size: 12px; letter-spacing: 0.12em; color: #e8a87c; text-transform: uppercase; margin-bottom: 12px; }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(28px, 5vw, 44px); line-height: 1.2; margin-bottom: 12px; }
  .hero p { font-size: 14px; color: #aaa; max-width: 400px; margin: 0 auto; }

  /* CATEGORY TABS */
  .tabs-wrap {
    position: sticky;
    top: 60px;
    z-index: 90;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tabs {
    display: flex;
    padding: 0 16px;
    min-width: max-content;
  }
  .tab {
    padding: 14px 18px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .tab:hover:not(.active) { color: var(--text); }

  /* MAIN */
  main { max-width: 680px; margin: 0 auto; padding: 20px 16px 120px; }

  .category-section { display: none; }
  .category-section.active { display: block; }

  .section-title {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 24px 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* PRODUCT CARD */
  .product-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 10px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .product-card.has-qty {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .product-thumb {
    width: 72px;
    height: 72px;
    border-radius: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    flex-shrink: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }
  .product-body { flex: 1; min-width: 0; }
  .product-name { font-size: 14px; font-weight: 500; margin-bottom: 5px; line-height: 1.3; }
  .product-prices { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .price-tag {
    font-size: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 2px 10px;
    color: var(--muted);
    transition: background 0.15s, transform 0.1s;
    display: inline-block;
  }
  .price-tag:hover { background: var(--border); }
  .price-tag:active { transform: scale(0.95); }
  .price-tag.deal {
    background: var(--success-light);
    border-color: #b2dbc5;
    color: var(--success);
    font-weight: 500;
  }
  .price-tag.deal:hover { background: #d4eee0; }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(30,30,30,0.9);
    color: #fff;
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 13px;
    z-index: 999;
    animation: toastIn 0.2s ease;
    white-space: nowrap;
  }
    0%   { transform: scale(1); }
    30%  { transform: scale(1.35) translateY(-4px); }
    60%  { transform: scale(0.95) translateY(1px); }
    100% { transform: scale(1) translateY(0); }
  }
  .price-tag.bounce { animation: tagBounce 0.3s ease; }
  .deal-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 4px;
    padding: 2px 7px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .qty-area {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 4px;
  }
  .qty-controls {
    display: flex;
    align-items: center;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: var(--bg);
  }
  .qty-btn {
    width: 32px;
    height: 32px;
    border: none;
    background: none;
    font-size: 18px;
    cursor: pointer;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
  }
  .qty-btn:hover { background: var(--border); }
  .qty-input {
    width: 40px;
    height: 32px;
    border: none;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    text-align: center;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    background: #fff;
    color: var(--text);
    -moz-appearance: textfield;
  }
  .qty-input::-webkit-outer-spin-button,
  .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .item-subtotal {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    margin-left: auto;
    min-width: 72px;
    text-align: right;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .item-subtotal.visible { opacity: 1; }

  /* STICKY FOOTER */
  .order-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 200;
  }
  .order-bar-info { flex: 1; }
  .order-bar-label { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .order-bar-total { font-size: 22px; font-weight: 700; color: var(--text); }
  .order-bar-items { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .order-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 14px 28px;
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .order-btn:hover { opacity: 0.9; }
  .order-btn:active { transform: scale(0.97); }

  /* ORDER MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px;
    width: 100%;
    max-width: 680px;
    max-height: 80vh;
    overflow-y: auto;
    transform: translateY(40px);
    transition: transform 0.25s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .modal-title { font-size: 18px; font-weight: 700; }
  .modal-close { background: var(--bg); border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--muted); }
  .modal-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .modal-item:last-child { border-bottom: none; }
  .modal-item-name { color: var(--muted); }
  .modal-item-price { font-weight: 500; }
  .modal-total { display: flex; justify-content: space-between; margin-top: 16px; padding-top: 16px; border-top: 2px solid var(--text); font-size: 18px; font-weight: 700; }
  .confirm-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 16px;
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 20px;
    transition: opacity 0.15s;
  }
  .confirm-btn:hover { opacity: 0.9; }
  .empty-cart { text-align: center; color: var(--muted); padding: 32px 0; font-size: 14px; }

  /* Customer info */
  .customer-form { margin-top: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; color: var(--muted); margin-bottom: 5px; display: block; }
  .form-input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    outline: none;
  }
  .form-input:focus { border-color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo">Asia <span>Mart</span></div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('th')">TH</button>
      <button class="lang-btn" onclick="setLang('ko')">KO</button>
    </div>
    <button class="header-cart" onclick="openModal()">
      🛒 <span data-t="cart">Cart</span>
      <span class="cart-count" id="header-count">0</span>
    </button>
  </div>
</header>

<div class="hero">
  <div class="hero-sub">Fresh from Southeast Asia</div>
  <h1 data-t="hero_title">Authentic Asian<br>Online Order</h1>
  <p data-t="hero_desc">Select quantity to calculate price instantly. Discount applied for 3+ items!</p>
  <div style="margin-top:16px; background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.25); border-radius:10px; padding:12px 16px; max-width:400px; margin-left:auto; margin-right:auto;">
    <div style="font-size:13px; font-weight:700; color:#e8a87c; margin-bottom:4px;">💵 <span data-t="pay_title">Payment on Delivery Only</span></div>
    <div style="font-size:12px; color:#ccc;" data-t="pay_desc">Cash & Card accepted · No online payment</div>
  </div>
</div>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" onclick="switchTab(this,'frozen')" data-t="cat_frozen">🧊 A Frozen Food</button>
    <button class="tab" onclick="switchTab(this,'noodle')" data-t="cat_noodle">🍜 B Noodles</button>
    <button class="tab" onclick="switchTab(this,'sauce')" data-t="cat_sauce">🥫 C Sauces</button>
    <button class="tab" onclick="switchTab(this,'other')" data-t="cat_other">🧃 D Drinks & More</button>
  </div>
</div>

<main id="main-content"></main>

<div class="order-bar">
  <div class="order-bar-info">
    <div class="order-bar-label" data-t="total_label">Total</div>
    <div class="order-bar-total" id="grand-total">₩0</div>
    <div class="order-bar-items" id="item-summary" data-t="select_items">Please select items</div>
  </div>
  <button class="order-btn" onclick="playFanfare();openModal()" data-t="order_btn">Order Now →</button>
</div>

<div class="modal-overlay" id="modal" onclick="closeOnOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" data-t="order_confirm">Order Summary</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

let currentLang = 'en';

function setLang(lang) {
  currentLang = lang;
  const t = i18n[lang];

  // Update all data-t elements
  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.getAttribute('data-t');
    if (t[key] && typeof t[key] === 'string') el.innerHTML = t[key];
  });

  // Update lang buttons
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === lang.toUpperCase());
  });

  // Re-render current tab to update product names
  renderTab(currentTab);
  updateSummary();
}

const quantities = {};
let currentTab = 'frozen';

function getPrice(item, qty) {
  if (!qty || qty <= 0) return 0;

  const tiers = [];
  if (item.price10) tiers.push({ qty: 10, price: item.price10 });
  if (item.price5)  tiers.push({ qty: 5,  price: item.price5 });
  if (item.price3)  tiers.push({ qty: 3,  price: item.price3 });
  if (item.price2)  tiers.push({ qty: 2,  price: item.price2 });

  let total = 0, remaining = qty;
  let bestTierUsed = null;

  for (const tier of tiers) {
    if (remaining >= tier.qty) {
      const sets = Math.floor(remaining / tier.qty);
      total += sets * tier.price;
      remaining -= sets * tier.qty;
      bestTierUsed = tier;
    }
  }

  if (remaining > 0) {
    if (bestTierUsed) {
      // 사용된 최고 묶음의 단가로 계산 후 100원 올림
      const unitPrice = bestTierUsed.price / bestTierUsed.qty;
      total += Math.ceil(remaining * unitPrice / 100) * 100;
    } else {
      total += remaining * item.price1;
    }
  }

  return total;
}

function getUnit(n) {
  if (currentLang === 'ko') return `${n}개`;
  if (currentLang === 'th') return `${n}ชิ้น`;
  return n === 1 ? `${n}pc` : `${n}pcs`;
}

function getPriceTags(item) {
  const makeTag = (n, price, isDeal) => {
    const cls = isDeal ? 'price-tag deal' : 'price-tag';
    return `<span class="${cls}">${getUnit(n)} ${fmt(price)}</span>`;
  };
  const tags = [makeTag(1, item.price1, false)];
  if (item.price2)  tags.push(makeTag(2, item.price2, true));
  if (item.price3)  tags.push(makeTag(3, item.price3, true));
  if (item.price5)  tags.push(makeTag(5, item.price5, true));
  if (item.price10) tags.push(makeTag(10, item.price10, true));
  return tags.join('');
}

let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx || audioCtx.state === 'closed') {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playDing() {
  try {
    const ctx = getAudioCtx();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g);
    g.connect(ctx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(1200, ctx.currentTime);
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
    o.start(ctx.currentTime);
    o.stop(ctx.currentTime + 0.08);
  } catch(e) {}
}

function playReset() {
  try {
    const ctx = getAudioCtx();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g);
    g.connect(ctx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(400, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.15);
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    o.start(ctx.currentTime);
    o.stop(ctx.currentTime + 0.15);
  } catch(e) {}
}

function playFanfare() {
  try {
    const ctx = getAudioCtx();
    const notes = [523, 659, 784, 1047]; // C E G C 화음
    notes.forEach((freq, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g);
      g.connect(ctx.destination);
      o.type = 'triangle';
      const start = ctx.currentTime + i * 0.07;
      o.frequency.setValueAtTime(freq, start);
      g.gain.setValueAtTime(0.25, start);
      g.gain.exponentialRampToValueAtTime(0.001, start + 0.2);
      o.start(start);
      o.stop(start + 0.2);
    });
  } catch(e) {}
}
let toastTimer = null;
function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  if (toastTimer) clearTimeout(toastTimer);
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  toastTimer = setTimeout(() => el.remove(), 2000);
}

document.addEventListener('touchstart', () => getAudioCtx(), { once: true });
document.addEventListener('click', () => getAudioCtx(), { once: true });

function getDiscount(item, qty) {
  if (!qty || qty <= 0) return 0;
  const fullPrice = qty * item.price1;
  const discounted = getPrice(item, qty);
  return fullPrice - discounted;
}

function resetQty(id) {
  quantities[id] = 0;
  playReset();
  updateCard(id);
  updateSummary();
}

function getItemName(item) {
  if (currentLang === 'ko') return item.name_ko || item.name_en || '';
  return item.name_en || item.name_ko || '';
}

function fmt(n) { return '₩' + n.toLocaleString(); }

function renderTab(tab) {
  const container = document.getElementById('main-content');
  container.innerHTML = '';

  const cat = catalog[tab];
  const section = document.createElement('div');
  const catLabel = typeof cat.label === 'object' ? cat.label[currentLang] || cat.label.en : cat.label;
  section.innerHTML = `<div class="section-title">${cat.emoji} ${catLabel}</div>`;

  cat.items.forEach(item => {
    const qty = quantities[item.id] || 0;
    const subtotal = getPrice(item, qty);
    const displayName = getItemName(item);
    const card = document.createElement('div');
    card.className = 'product-card' + (qty > 0 ? ' has-qty' : '');
    card.id = 'card-' + item.id;
    card.innerHTML = `
      <div class="product-thumb">
        ${item.image
          ? `<img src="${item.image}" alt="${displayName}" style="width:100%;height:100%;object-fit:cover;border-radius:7px;" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
          : ''}
        <span style="display:${item.image ? 'none' : 'flex'};align-items:center;justify-content:center;width:100%;height:100%;font-size:28px;">${item.emoji}</span>
      </div>
      <div class="product-body">
        <div class="product-name">${displayName}</div>
        <div class="product-prices" id="prices-${item.id}">
          ${getPriceTags(item)}
        </div>
        <div class="qty-area">
          <div class="qty-controls">
            <button class="qty-btn" onclick="changeQty('${item.id}',-1,event)">−</button>
            <input class="qty-input" type="number" min="0" max="10" value="${qty}" id="input-${item.id}" onchange="setQty('${item.id}',this.value)" />
            <button class="qty-btn" onclick="changeQty('${item.id}',1,event)">+</button>
          </div>
          <div class="item-subtotal ${qty > 0 ? 'visible' : ''}" id="sub-${item.id}">
            ${qty > 0 ? `
              <div style="font-size:14px;font-weight:700;color:var(--accent);">${fmt(subtotal)}</div>
              ${getDiscount(item, qty) > 0 ? `<div style="font-size:11px;color:var(--success);font-weight:600;">-${fmt(getDiscount(item, qty))} ${i18n[currentLang].discount}</div>` : ''}
            ` : ''}
          </div>
        </div>
      </div>
    `;
    section.appendChild(card);
  });
  container.appendChild(section);
}

function updateCard(id) {
  const qty = quantities[id] || 0;
  const card = document.getElementById('card-' + id);
  const subEl = document.getElementById('sub-' + id);
  const inp = document.getElementById('input-' + id);
  const priceEl = document.getElementById('prices-' + id);
  if (!card) return;

  const item = Object.values(catalog).flatMap(c => c.items).find(p => p.id === id);
  const subtotal = getPrice(item, qty);

  if (inp) inp.value = qty;
  if (subEl) {
    if (qty > 0) {
      const discount = getDiscount(item, qty);
      subEl.innerHTML = `
        <div style="font-size:14px;font-weight:700;color:var(--accent);">${fmt(subtotal)}</div>
        ${discount > 0 ? `<div style="font-size:11px;color:var(--success);font-weight:600;">-${fmt(discount)} ${i18n[currentLang].discount}</div>` : ''}
      `;
      subEl.className = 'item-subtotal visible';
    } else {
      subEl.innerHTML = '';
      subEl.className = 'item-subtotal';
    }
  }
  if (priceEl) priceEl.innerHTML = getPriceTags(item);
  card.className = 'product-card' + (qty > 0 ? ' has-qty' : '');
}

function updateSummary() {
  const t = i18n[currentLang];
  let grand = 0, count = 0;
  const allItems = Object.values(catalog).flatMap(c => c.items);
  allItems.forEach(item => {
    const qty = quantities[item.id] || 0;
    if (qty > 0) { grand += getPrice(item, qty); count++; }
  });
  document.getElementById('grand-total').textContent = fmt(grand);
  document.getElementById('item-summary').textContent = count > 0 ? t.items_selected(count) : t.select_items;
  document.getElementById('header-count').textContent = count;
}

function changeQty(id, delta, e) {
  e && e.stopPropagation();
  const current = quantities[id] || 0;
  if (delta > 0 && current >= 10) {
    showToast(i18n[currentLang].max_qty);
    return;
  }
  quantities[id] = Math.min(10, Math.max(0, current + delta));
  if (delta > 0 && quantities[id] > 0) {
    playDing();
    const priceEl = document.getElementById('prices-' + id);
    if (priceEl) {
      const firstTag = priceEl.querySelector('.price-tag');
      if (firstTag) {
        firstTag.classList.remove('bounce');
        void firstTag.offsetWidth;
        firstTag.classList.add('bounce');
        setTimeout(() => firstTag.classList.remove('bounce'), 350);
      }
    }
  } else if (delta < 0 && quantities[id] >= 0) {
    playReset();
  }
  updateCard(id);
  updateSummary();
}

function setQty(id, val) {
  quantities[id] = Math.min(10, Math.max(0, parseInt(val) || 0));
  updateCard(id);
  updateSummary();
}

function switchTab(el, tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentTab = tab;
  renderTab(tab);
}

        </div>
        <div class="form-group">
          <label class="form-label">📘 ${t.field_facebook} <span style="font-size:11px;color:var(--muted);">(${t.optional})</span></label>

        </div>

          <div style="display:flex;gap:10px;margin-bottom:8px;align-items:flex-start;">
            <div style="flex-shrink:0;text-align:center;">

              <div style="font-size:11px;color:var(--muted);margin-top:4px;">${t.addr_example}</div>
            </div>

              <div id="addr-preview" style="display:none;margin-bottom:12px;">

              </div>
              <div id="addr-placeholder" style="margin-bottom:12px;">
                <div style="font-size:24px;margin-bottom:4px;">📸</div>
                <div style="font-size:11px;color:var(--muted);">${t.ph_addr}</div>
              </div>
              <div style="display:flex;gap:6px;justify-content:center;">
                <button type="button" onclick="document.getElementById('addr-camera').click()" style="flex:1;padding:8px 4px;border:1px solid var(--border);border-radius:8px;background:#fff;font-size:12px;cursor:pointer;">
                  📷 ${t.btn_camera}
                </button>
                <button type="button" onclick="document.getElementById('addr-gallery').click()" style="flex:1;padding:8px 4px;border:1px solid var(--border);border-radius:8px;background:#fff;font-size:12px;cursor:pointer;">
                  🖼️ ${t.btn_gallery}
                </button>
              </div>
              <input type="file" id="addr-camera"  accept="image/*" capture="environment" style="display:none;" onchange="previewAddr(this)" />
              <input type="file" id="addr-gallery" accept="image/*" style="display:none;" onchange="previewAddr(this)" />
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">${t.field_note}</label>
          <input class="form-input" type="text" id="cust-note" placeholder="${t.ph_note}" />
        </div>
      </div>
      <button class="confirm-btn" onclick="confirmOrder()">${t.confirm_btn}</button>
    `;
  }

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function closeOnOverlay(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

const TG_TOKEN = '8407483229:AAFapLvbJybVGqtLyo55EVsLIRZCCbieKk0';
const TG_CHAT  = '8626199213';

function previewAddr(input) {
  const file = input.files[0];
  if (!file) return;
  // 다른 input 초기화
  const otherId = input.id === 'addr-camera' ? 'addr-gallery' : 'addr-camera';
  document.getElementById(otherId).value = '';
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('addr-img').src = e.target.result;
    document.getElementById('addr-preview').style.display = 'block';
    document.getElementById('addr-placeholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function sendToTelegram(text, photoFile) {
  const apiBase = `https://api.telegram.org/bot${TG_TOKEN}`;
  try {
    if (photoFile) {
      const form = new FormData();
      form.append('chat_id', TG_CHAT);
      form.append('photo', photoFile);
      form.append('caption', text);
      await fetch(`${apiBase}/sendPhoto`, { method:'POST', body: form });
    } else {
      await fetch(`${apiBase}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: TG_CHAT, text })
      });
    }
  } catch(e) {
    console.error('Telegram error:', e);
  }
}

  sendToTelegram(msg, photoFile);
