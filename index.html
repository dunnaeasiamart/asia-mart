<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asia Mart — Online Order</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+Thai:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf9f6;
    --surface: #ffffff;
    --border: #e8e4dc;
    --text: #1a1814;
    --muted: #7a7570;
    --accent: #c84b2f;
    --accent-light: #fdf0ed;
    --success: #2d7a4f;
    --success-light: #edf7f2;
    --gold: #b8860b;
  }

  body {
    font-family: 'Noto Sans KR', 'Noto Sans Thai', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* LANG SWITCHER */
  .lang-switcher {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .lang-btn {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 4px 9px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    letter-spacing: 0.03em;
  }
  .lang-btn.active { background: #fff; color: var(--text); }
  .lang-btn:hover:not(.active) { background: rgba(255,255,255,0.25); }

  /* HEADER */
  header {
    background: var(--text);
    color: #fff;
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    letter-spacing: 0.02em;
    color: #fff;
  }
  .logo span { color: #e8a87c; }
  .header-cart {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 100px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .header-cart:hover { opacity: 0.85; }
  .cart-count {
    background: #fff;
    color: var(--accent);
    font-weight: 700;
    font-size: 11px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* HERO */
  .hero {
    background: var(--text);
    color: #fff;
    padding: 40px 24px 48px;
    text-align: center;
  }
  .hero-sub { font-size: 12px; letter-spacing: 0.12em; color: #e8a87c; text-transform: uppercase; margin-bottom: 12px; }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(28px, 5vw, 44px); line-height: 1.2; margin-bottom: 12px; }
  .hero p { font-size: 14px; color: #aaa; max-width: 400px; margin: 0 auto; }

  /* BEST PRODUCTS */
  .best-section {
    background: var(--surface);
    padding: 16px 0 20px;
    border-bottom: 1px solid var(--border);
  }
  .best-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    margin-bottom: 12px;
  }
  .best-title {
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .best-scroll {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding: 0 16px;
    scrollbar-width: none;
  }
  .best-scroll::-webkit-scrollbar { display: none; }
  .best-card {
    flex-shrink: 0;
    width: 110px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .best-card:active { transform: scale(0.97); }
  .best-card.has-qty {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .best-card-img {
    width: 100%;
    height: 90px;
    object-fit: contain;
    background: #fff;
    padding: 4px;
  }
  .best-card-img-emoji {
    width: 100%;
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    background: #fff;
  }
  .best-card-body {
    padding: 8px;
  }
  .best-card-name {
    font-size: 11px;
    font-weight: 500;
    line-height: 1.3;
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .best-card-price {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
  }
  .best-card-qty {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .best-qty-btn {
    width: 26px;
    height: 26px;
    border: none;
    background: none;
    font-size: 16px;
    cursor: pointer;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .best-qty-val {
    font-size: 13px;
    font-weight: 600;
    min-width: 20px;
    text-align: center;
  }
  .tabs-wrap {
    position: sticky;
    top: 60px;
    z-index: 90;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tabs {
    display: flex;
    padding: 0 16px;
    min-width: max-content;
  }
  .tab {
    padding: 14px 18px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .tab:hover:not(.active) { color: var(--text); }

  /* MAIN */
  main { max-width: 680px; margin: 0 auto; padding: 20px 16px 120px; }

  .category-section { display: none; }
  .category-section.active { display: block; }

  .section-title {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 24px 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* PRODUCT CARD */
  .product-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 10px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .product-card.has-qty {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .product-thumb {
    width: 120px;
    height: 120px;
    border-radius: 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    flex-shrink: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
  }
  .product-body { flex: 1; min-width: 0; }
  .product-name { font-size: 14px; font-weight: 500; margin-bottom: 5px; line-height: 1.3; }
  .product-prices { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .price-tag {
    font-size: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 2px 10px;
    color: var(--muted);
    transition: background 0.15s, transform 0.1s;
    display: inline-block;
  }
  .price-tag:hover { background: var(--border); }
  .price-tag:active { transform: scale(0.95); }
  .price-tag.deal {
    background: var(--success-light);
    border-color: #b2dbc5;
    color: var(--success);
    font-weight: 500;
  }
  .price-tag.deal:hover { background: #d4eee0; }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(30,30,30,0.9);
    color: #fff;
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 13px;
    z-index: 999;
    animation: toastIn 0.2s ease;
    white-space: nowrap;
  }
    0%   { transform: scale(1); }
    30%  { transform: scale(1.35) translateY(-4px); }
    60%  { transform: scale(0.95) translateY(1px); }
    100% { transform: scale(1) translateY(0); }
  }
  .price-tag.bounce { animation: tagBounce 0.3s ease; }
  .deal-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 4px;
    padding: 2px 7px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .qty-area {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 4px;
  }
  .qty-controls {
    display: flex;
    align-items: center;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: var(--bg);
  }
  .qty-btn {
    width: 32px;
    height: 32px;
    border: none;
    background: none;
    font-size: 18px;
    cursor: pointer;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
  }
  .qty-btn:hover { background: var(--border); }
  .qty-input {
    width: 40px;
    height: 32px;
    border: none;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    text-align: center;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    background: #fff;
    color: var(--text);
    -moz-appearance: textfield;
  }
  .qty-input::-webkit-outer-spin-button,
  .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .item-subtotal {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    margin-left: auto;
    min-width: 72px;
    text-align: right;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .item-subtotal.visible { opacity: 1; }

  /* STICKY FOOTER */
  .order-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 200;
  }
  .order-bar-info { flex: 1; }
  .order-bar-label { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .order-bar-total { font-size: 22px; font-weight: 700; color: var(--text); }
  .order-bar-items { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .order-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 14px 28px;
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .order-btn:hover { opacity: 0.9; }
  .order-btn:active { transform: scale(0.97); }

  /* ORDER MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px;
    width: 100%;
    max-width: 680px;
    max-height: 80vh;
    overflow-y: auto;
    transform: translateY(40px);
    transition: transform 0.25s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .modal-title { font-size: 18px; font-weight: 700; }
  .modal-close { background: var(--bg); border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--muted); }
  .modal-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .modal-item:last-child { border-bottom: none; }
  .modal-item-name { color: var(--muted); }
  .modal-item-price { font-weight: 500; }
  .modal-total { display: flex; justify-content: space-between; margin-top: 16px; padding-top: 16px; border-top: 2px solid var(--text); font-size: 18px; font-weight: 700; }
  .confirm-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 16px;
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 20px;
    transition: opacity 0.15s;
  }
  .confirm-btn:hover { opacity: 0.9; }
  .empty-cart { text-align: center; color: var(--muted); padding: 32px 0; font-size: 14px; }

  /* Customer info */
  .customer-form { margin-top: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; color: var(--muted); margin-bottom: 5px; display: block; }
  .form-input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    outline: none;
  }
  .form-input:focus { border-color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo">Asia <span>Mart</span></div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('th')">TH</button>
      <button class="lang-btn" onclick="setLang('ko')">KO</button>
    </div>
    <button class="header-cart" onclick="openModal()">
      🛒 <span data-t="cart">Cart</span>
      <span class="cart-count" id="header-count">0</span>
    </button>
  </div>
</header>

<div class="hero">
  <div class="hero-sub">Fresh from Southeast Asia</div>
  <h1 data-t="hero_title">Authentic Asian<br>Online Order</h1>
  <p data-t="hero_desc">Select quantity to calculate price instantly. Discount applied for 3+ items!</p>
  <div style="margin-top:16px; background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.25); border-radius:10px; padding:12px 16px; max-width:400px; margin-left:auto; margin-right:auto;">
    <div style="font-size:13px; font-weight:700; color:#e8a87c; margin-bottom:4px;">💵 <span data-t="pay_title">Payment on Delivery Only</span></div>
    <div style="font-size:12px; color:#ccc;" data-t="pay_desc">Cash & Card accepted · No online payment</div>
  </div>
</div>

<div class="best-section" id="best-section">
  <div class="best-header">
    <div class="best-title">🔥 <span data-t="best_title">Best Products</span></div>
  </div>
  <div class="best-scroll" id="best-scroll"></div>
</div>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" onclick="switchTab(this,'frozen')" data-t="cat_frozen">🧊 A Frozen Food</button>
    <button class="tab" onclick="switchTab(this,'noodle')" data-t="cat_noodle">🍜 B Noodles</button>
    <button class="tab" onclick="switchTab(this,'sauce')" data-t="cat_sauce">🥫 C Sauces</button>
    <button class="tab" onclick="switchTab(this,'other')" data-t="cat_other">🧃 D Drinks & More</button>
    <button class="tab" onclick="switchTab(this,'essentials')" data-t="cat_essentials">🧴 E Daily Essentials</button>
    <button class="tab" onclick="switchTab(this,'veggie')" data-t="cat_veggie" style="display:none;">🥬 F 농산물</button>
  </div>
</div>

<main id="main-content"></main>

<div class="order-bar">
  <div class="order-bar-info">
    <div class="order-bar-label" data-t="total_label">Total</div>
    <div class="order-bar-total" id="grand-total">₩0</div>
    <div class="order-bar-items" id="item-summary" data-t="select_items">Please select items</div>
    <div id="total-discount" style="font-size:12px;color:var(--success);font-weight:600;margin-top:2px;display:none;"></div>
    <div id="min-order-notice" style="font-size:11px;color:var(--accent);font-weight:600;margin-top:3px;"></div>
  </div>
  <button class="order-btn" onclick="playFanfare();openModal()" data-t="order_btn">Order Now →</button>
</div>

<div class="modal-overlay" id="modal" onclick="closeOnOverlay(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" data-t="order_confirm">Order Summary</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
/* ===================================================
   🌐 LANGUAGE SYSTEM
   =================================================== */
const i18n = {
  en: {
    cart: 'Cart', hero_title: 'Authentic Asian<br>Online Order',
    hero_desc: 'Select quantity to calculate price instantly. Discount applied for 3+ items!',
    best_title: 'Best Products',
    cat_frozen: '🧊 A Frozen Food', cat_noodle: '🍜 B Noodles',
    cat_sauce: '🥫 C Sauces', cat_other: '🧃 D Drinks & More',
    cat_essentials: '🧴 E Daily Essentials',
    cat_veggie: '🥬 F Vegetables & Produce',
    total_label: 'Total', select_items: 'Please select items',
    order_btn: 'Order Now →', order_confirm: 'Order Summary',
    items_selected: (n) => `${n} item(s) selected`,
    empty_cart: 'Your cart is empty.<br>Please select items.',
    field_name: 'Name', field_phone: 'Phone', field_note: 'Note (optional)',
    field_facebook: 'Facebook Name', ph_facebook: 'Your name on Facebook (e.g. Maria Santos)', optional: 'Optional',
    ph_name: 'Your name', ph_phone: '010-0000-0000', ph_note: 'Delivery requests, etc.',
    confirm_btn: 'Place Order', grand_total: 'Total',
    alert_fill: 'Please enter your name.',
    alert_contact: 'Please enter at least your phone number or Facebook name.',
    order_done_title: 'Order Placed!',
    order_done_desc: 'We received your order. Please message us on Facebook to confirm.',
    order_done_fb: '📘 Tap below to send us a message on Facebook Messenger',
    alert_done: (name, phone) => `✅ Order placed!\n\nName: ${name}\nPhone: ${phone}\n\nWe will contact you soon. Thank you!`,
    pay_title: 'Payment on Delivery Only',
    pay_desc: 'Cash & Card accepted · No online payment',
    pay_modal: '💵 Payment is made in person at delivery (Cash or Card)',
    field_addr: 'Address Photo (Street Sign)',
    ph_addr: 'Please upload a photo of your street sign',
    btn_camera: 'Take Photo',
    btn_gallery: 'Choose from Gallery',
    addr_uploaded: 'Photo uploaded',
    addr_example: 'Example',
    max_qty: '⚠️ Maximum 10 items per product.',
    discount: 'OFF!',
    total_discount: (n) => `Total saved: -${n}`,
    min_order: (n) => `⚠️ ₩${n} more for minimum order (₩50,000)`,
    min_order_ok: '✅ Free delivery included!',
  },
  th: {
    cart: 'ตะกร้า', hero_title: 'อาหารเอเชียแท้<br>สั่งซื้อออนไลน์',
    hero_desc: 'เลือกจำนวนเพื่อคำนวณราคาทันที ส่วนลดอัตโนมัติเมื่อซื้อ 3 ชิ้นขึ้นไป!',
    best_title: 'สินค้าขายดี',
    cat_frozen: '🧊 A อาหารแช่แข็ง', cat_noodle: '🍜 B เส้นก๋วยเตี๋ยว',
    cat_sauce: '🥫 C ซอสต่างๆ', cat_other: '🧃 D เครื่องดื่ม & อื่นๆ',
    cat_essentials: '🧴 E สินค้าอุปโภค',
    cat_veggie: '🥬 F ผักและผลไม้',
    total_label: 'ยอดรวม', select_items: 'กรุณาเลือกสินค้า',
    order_btn: 'สั่งซื้อเลย →', order_confirm: 'สรุปคำสั่งซื้อ',
    items_selected: (n) => `เลือก ${n} รายการ`,
    empty_cart: 'ตะกร้าว่างเปล่า<br>กรุณาเลือกสินค้า',

let currentLang = 'en';

function setLang(lang) {
  currentLang = lang;
  const t = i18n[lang];

  // Update all data-t elements
  document.querySelectorAll('[data-t]').forEach(el => {
    const key = el.getAttribute('data-t');
    if (t[key] && typeof t[key] === 'string') el.innerHTML = t[key];
  });

  // Update lang buttons
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === lang.toUpperCase());
  });

  // Re-render current tab to update product names
  renderTab(currentTab);
  renderBest();
  updateSummary();
}

const quantities = {};
let currentTab = 'frozen';

function getPrice(item, qty) {
  if (!qty || qty <= 0) return 0;
  if (qty === 1) return item.price1;

  const tiers = [];
  if (item.price10) tiers.push({ qty: 10, price: item.price10 });
  if (item.price5)  tiers.push({ qty: 5,  price: item.price5 });
  if (item.price3)  tiers.push({ qty: 3,  price: item.price3 });
  if (item.price2)  tiers.push({ qty: 2,  price: item.price2 });

  // qty 이하의 가장 큰 묶음 1번만 적용
  const applicableTier = tiers.find(t => qty >= t.qty);
  if (!applicableTier) return qty * item.price1;

  // 묶음 단가 100원 내림으로 고정
  const unitPrice = Math.floor(applicableTier.price / applicableTier.qty / 100) * 100;
  const remainder = qty - applicableTier.qty;

  // 묶음 1번 + 나머지는 단가로 1개씩 추가
  return applicableTier.price + remainder * unitPrice;
}

function getUnit(n) {
  if (currentLang === 'ko') return `${n}개`;
  if (currentLang === 'th') return `${n}ชิ้น`;
  return n === 1 ? `${n}pc` : `${n}pcs`;
}

function getPriceTags(item) {
  const makeTag = (n, price, style) => {
    return `<span class="price-tag" style="cursor:pointer;transition:all 0.15s;${style}">${getUnit(n)} ${fmt(price)}</span>`;
  };
  const tags = [makeTag(1, item.price1, 'background:#f0f0f0;border-color:#ccc;color:#666;')];
  if (item.price2)  tags.push(makeTag(2, item.price2, 'background:#e8f0fe;border-color:#90b4f5;color:#1a56db;font-weight:500;'));
  if (item.price3)  tags.push(makeTag(3, item.price3, 'background:#fde8e8;border-color:#f5a0a0;color:#c81e1e;font-weight:500;'));
  if (item.price5)  tags.push(makeTag(5, item.price5, 'background:#fde8e8;border-color:#f5a0a0;color:#c81e1e;font-weight:500;'));
  if (item.price10) tags.push(makeTag(10, item.price10, 'background:#fde8e8;border-color:#f5a0a0;color:#c81e1e;font-weight:500;'));
  tags.push(`<span class="price-tag" onclick="resetQty('${item.id}')" style="cursor:pointer;background:#f5f5f5;color:#aaa;border-color:#ddd;">🔄</span>`);
  return tags.join('');
}

let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx || audioCtx.state === 'closed') {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playDing() {
  try {
    const ctx = getAudioCtx();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g);
    g.connect(ctx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(1200, ctx.currentTime);
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
    o.start(ctx.currentTime);
    o.stop(ctx.currentTime + 0.08);
  } catch(e) {}
}

function playReset() {
  try {
    const ctx = getAudioCtx();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g);
    g.connect(ctx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(400, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.15);
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    o.start(ctx.currentTime);
    o.stop(ctx.currentTime + 0.15);
  } catch(e) {}
}

function playFanfare() {
  try {
    const ctx = getAudioCtx();
    const notes = [523, 659, 784, 1047]; // C E G C 화음
    notes.forEach((freq, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g);
      g.connect(ctx.destination);
      o.type = 'triangle';
      const start = ctx.currentTime + i * 0.07;
      o.frequency.setValueAtTime(freq, start);
      g.gain.setValueAtTime(0.25, start);
      g.gain.exponentialRampToValueAtTime(0.001, start + 0.2);
      o.start(start);
      o.stop(start + 0.2);
    });
  } catch(e) {}
}
let toastTimer = null;
function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  if (toastTimer) clearTimeout(toastTimer);
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  toastTimer = setTimeout(() => el.remove(), 2000);
}

document.addEventListener('touchstart', () => getAudioCtx(), { once: true });
document.addEventListener('click', () => getAudioCtx(), { once: true });

function getDiscount(item, qty) {
  if (!qty || qty <= 0) return 0;
  const fullPrice = qty * item.price1;
  const discounted = getPrice(item, qty);
  return fullPrice - discounted;
}

function resetQty(id) {
  quantities[id] = 0;
  playReset();
  updateCard(id);
  updateSummary();
}

function getItemName(item) {
  if (currentLang === 'ko') return item.name_ko || item.name_en || '';
  if (currentLang === 'th') return item.name_th || item.name_en || '';
  return item.name_en || item.name_ko || '';
}

function fmt(n) { return '₩' + n.toLocaleString(); }

function renderTab(tab) {
  const container = document.getElementById('main-content');
  container.innerHTML = '';

  const cat = catalog[tab];
  const section = document.createElement('div');
  const catLabel = typeof cat.label === 'object' ? cat.label[currentLang] || cat.label.en : cat.label;
  section.innerHTML = `<div class="section-title">${cat.emoji} ${catLabel}</div>`;

  cat.items.forEach(item => {
    const qty = quantities[item.id] || 0;
    const subtotal = getPrice(item, qty);
    const displayName = getItemName(item);
    const card = document.createElement('div');
    card.className = 'product-card' + (qty > 0 ? ' has-qty' : '');
    card.id = 'card-' + item.id;
    card.innerHTML = `
      <div class="product-thumb">
        ${item.image
          ? `<img src="${item.image}" alt="${displayName}" loading="lazy" style="width:100%;height:100%;object-fit:contain;border-radius:8px;padding:4px;" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
          : ''}
        <span style="display:${item.image ? 'none' : 'flex'};align-items:center;justify-content:center;width:100%;height:100%;font-size:28px;">${item.emoji}</span>
      </div>
      <div class="product-body">
        <div class="product-name">${displayName}</div>
        <div class="product-prices" id="prices-${item.id}">
          ${getPriceTags(item)}
        </div>
        <div class="qty-area">
          <div class="qty-controls">
            <button class="qty-btn" onclick="changeQty('${item.id}',-1,event)">−</button>
            <input class="qty-input" type="number" min="0" max="10" value="${qty}" id="input-${item.id}" onchange="setQty('${item.id}',this.value)" />
            <button class="qty-btn" onclick="changeQty('${item.id}',1,event)">+</button>
          </div>
          <div class="item-subtotal ${qty > 0 ? 'visible' : ''}" id="sub-${item.id}">
            ${qty > 0 ? `
              <div style="font-size:14px;font-weight:700;color:var(--accent);">${fmt(subtotal)}</div>
              ${getDiscount(item, qty) > 0 ? `<div style="font-size:11px;color:var(--success);font-weight:600;">-${fmt(getDiscount(item, qty))} ${i18n[currentLang].discount}</div>` : ''}
            ` : ''}
          </div>
        </div>
      </div>
    `;
    section.appendChild(card);
  });
  container.appendChild(section);
}

function updateCard(id) {
  const qty = quantities[id] || 0;
  const card = document.getElementById('card-' + id);
  const subEl = document.getElementById('sub-' + id);
  const inp = document.getElementById('input-' + id);
  const priceEl = document.getElementById('prices-' + id);
  if (!card) return;

  const item = Object.values(catalog).flatMap(c => c.items).find(p => p.id === id);
  const subtotal = getPrice(item, qty);

  if (inp) inp.value = qty;
  if (subEl) {
    if (qty > 0) {
      const discount = getDiscount(item, qty);
      subEl.innerHTML = `
        <div style="font-size:14px;font-weight:700;color:var(--accent);">${fmt(subtotal)}</div>
        ${discount > 0 ? `<div style="font-size:11px;color:var(--success);font-weight:600;">-${fmt(discount)} ${i18n[currentLang].discount}</div>` : ''}
      `;
      subEl.className = 'item-subtotal visible';
    } else {
      subEl.innerHTML = '';
      subEl.className = 'item-subtotal';
    }
  }
  if (priceEl) priceEl.innerHTML = getPriceTags(item);
  card.className = 'product-card' + (qty > 0 ? ' has-qty' : '');
}

function updateSummary() {
  const t = i18n[currentLang];
  let grand = 0, count = 0, totalDiscount = 0;
  const allItems = Object.values(catalog).flatMap(c => c.items);
  allItems.forEach(item => {
    const qty = quantities[item.id] || 0;
    if (qty > 0) {
      grand += getPrice(item, qty);
      totalDiscount += getDiscount(item, qty);
      count++;
    }
  });
  document.getElementById('grand-total').textContent = fmt(grand);
  document.getElementById('item-summary').textContent = count > 0 ? t.items_selected(count) : t.select_items;
  document.getElementById('header-count').textContent = count;
  const discEl = document.getElementById('total-discount');
  if (totalDiscount > 0) {
    discEl.textContent = t.total_discount(fmt(totalDiscount));
    discEl.style.display = 'block';
  } else {
    discEl.style.display = 'none';
  }

  const minOrderEl = document.getElementById('min-order-notice');
  const orderBtn = document.querySelector('.order-btn');
  const MIN_ORDER = 50000;
  if (count > 0 && grand >= MIN_ORDER) {
    minOrderEl.textContent = t.min_order_ok;
    minOrderEl.style.color = 'var(--success)';
    if (orderBtn) { orderBtn.style.opacity = '1'; orderBtn.style.pointerEvents = 'auto'; }
  } else if (count > 0 && grand < MIN_ORDER) {
    const need = (MIN_ORDER - grand).toLocaleString();
    minOrderEl.textContent = t.min_order(need);
    minOrderEl.style.color = 'var(--accent)';
    if (orderBtn) { orderBtn.style.opacity = '0.4'; orderBtn.style.pointerEvents = 'none'; }
  } else {
    minOrderEl.textContent = t.min_order('50,000');
    minOrderEl.style.color = 'var(--muted)';
    if (orderBtn) { orderBtn.style.opacity = '0.4'; orderBtn.style.pointerEvents = 'none'; }
  }
}

function changeQty(id, delta, e) {
  e && e.stopPropagation();
  const current = quantities[id] || 0;
  if (delta > 0 && current >= 10) {
    showToast(i18n[currentLang].max_qty);
    return;
  }
  quantities[id] = Math.min(10, Math.max(0, current + delta));
  if (delta > 0 && quantities[id] > 0) {
    playDing();
    const priceEl = document.getElementById('prices-' + id);
    if (priceEl) {
      const firstTag = priceEl.querySelector('.price-tag');
      if (firstTag) {
        firstTag.classList.remove('bounce');
        void firstTag.offsetWidth;
        firstTag.classList.add('bounce');
        setTimeout(() => firstTag.classList.remove('bounce'), 350);
      }
    }
  } else if (delta < 0 && quantities[id] >= 0) {
    playReset();
  }
  updateCard(id);
  updateSummary();
}

function setQty(id, val) {
  quantities[id] = Math.min(10, Math.max(0, parseInt(val) || 0));
  updateCard(id);
  updateSummary();
}

function switchTab(el, tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentTab = tab;
  renderTab(tab);
}

function previewAddr(input) {

async function sendToTelegram(text, photoFile) {
  const apiBase = `https://api.telegram.org/bot${TG_TOKEN}`;
  try {
    if (photoFile) {
      const form = new FormData();
      form.append('chat_id', TG_CHAT);
      form.append('photo', photoFile);
      form.append('caption', text);
      await fetch(`${apiBase}/sendPhoto`, { method:'POST', body: form });
    } else {
      await fetch(`${apiBase}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: TG_CHAT, text })
      });
    }
  } catch(e) {
    console.error('Telegram error:', e);
  }
}

// 베스트 상품 ID 목록 - Firebase에서 불러옴
let bestIds = ['a1','b25','c15','c19','d16']; // 기본값

function renderBest() {
  const container = document.getElementById('best-scroll');
  if (!container) return;
  container.innerHTML = '';
  const allItems = Object.values(catalog).flatMap(c => c.items);

  bestIds.forEach(id => {
    const item = allItems.find(p => p.id === id);
    if (!item) return;
    const qty = quantities[id] || 0;
    const card = document.createElement('div');
    card.className = 'best-card' + (qty > 0 ? ' has-qty' : '');
    card.id = 'best-card-' + id;

    const imgHtml = item.image
      ? `<img class="best-card-img" src="${item.image}" alt="${getItemName(item)}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
      : '';
    const emojiHtml = `<div class="best-card-img-emoji" style="display:${item.image ? 'none' : 'flex'}">${item.emoji}</div>`;

    card.innerHTML = `
      ${imgHtml}${emojiHtml}
      <div class="best-card-body">
        <div class="best-card-name">${getItemName(item)}</div>
        <div class="best-card-price">${fmt(item.price1)}</div>
        <div class="best-card-qty" id="best-qty-${id}">
          <button class="best-qty-btn" onclick="changeBestQty('${id}',-1,event)">−</button>
          <span class="best-qty-val">${qty}</span>
          <button class="best-qty-btn" onclick="changeBestQty('${id}',1,event)">+</button>
        </div>
      </div>`;

    // 클릭하면 해당 카테고리 탭으로 이동
    card.addEventListener('click', (e) => {
      if (e.target.classList.contains('best-qty-btn')) return;
      const cat = Object.entries(catalog).find(([k,v]) => v.items.some(p => p.id === id));
      if (cat) {
        const tabBtn = document.querySelector(`[onclick*="'${cat[0]}'"]`);
        if (tabBtn) { switchTab(tabBtn, cat[0]); tabBtn.scrollIntoView({behavior:'smooth'}); }
        setTimeout(() => {
          const mainCard = document.getElementById('card-' + id);
          if (mainCard) mainCard.scrollIntoView({behavior:'smooth', block:'center'});
        }, 200);
      }
    });

    container.appendChild(card);
  });
}

function changeBestQty(id, delta, e) {
  e && e.stopPropagation();
  changeQty(id, delta, e);
  updateBestCard(id);
}

function updateBestCard(id) {
  const qty = quantities[id] || 0;
  const card = document.getElementById('best-card-' + id);
  if (!card) return;
  card.className = 'best-card' + (qty > 0 ? ' has-qty' : '');
  const qtyDiv = document.getElementById('best-qty-' + id);
  if (qtyDiv) qtyDiv.querySelector('.best-qty-val').textContent = qty;
}

renderBest();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB7Wwwf75nQIY0C67sl1PdJSrofSMwCx-o",
  authDomain: "asia-mart-a0292.firebaseapp.com",
  databaseURL: "https://asia-mart-a0292-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "asia-mart-a0292",
  storageBucket: "asia-mart-a0292.firebasestorage.app",
  messagingSenderId: "6786874274",
  appId: "1:6786874274:web:50f7bec4fb3668cb4c10fb"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

async function loadStock() {
  try {
    const snapshot = await get(ref(db, 'stock'));
    window._stock = snapshot.val() || {};
    renderTab(currentTab);
  } catch(e) {
    console.log('재고 로드 실패:', e);
  }
}

// 재고 적용 함수
window.applyStock = function() {
  const stock = window._stock || {};
  const allItems = Object.values(catalog).flatMap(c => c.items);
  allItems.forEach(item => {
    const s = stock[item.id];
    const card = document.getElementById('card-' + item.id);
    if (!card) return;

    // 기존 배지 제거
    card.querySelectorAll('.sold-out-badge, .stock-badge').forEach(b => b.remove());

    if (s === 0) {
      // 품절 처리
      card.style.opacity = '0.5';
      card.style.pointerEvents = 'none';
      card.style.position = 'relative';
      const badge = document.createElement('div');
      badge.className = 'sold-out-badge';
      badge.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.75);color:#fff;padding:6px 16px;border-radius:100px;font-size:12px;font-weight:700;white-space:nowrap;z-index:10;';
      badge.textContent = '품절 / Sold Out';
      card.appendChild(badge);
      // 수량 0으로
      quantities[item.id] = 0;
      const inp = document.getElementById('input-' + item.id);
      if (inp) inp.value = 0;
    } else {
      card.style.opacity = '1';
      card.style.pointerEvents = 'auto';

      if (s > 0 && s !== undefined) {
        // 재고 수량 표시
        const badge = document.createElement('div');
        badge.className = 'stock-badge';
        badge.style.cssText = 'font-size:11px;color:var(--muted);margin-top:2px;';
        badge.textContent = currentLang === 'ko' ? `재고: ${s}개` : currentLang === 'th' ? `คงเหลือ: ${s}` : `Stock: ${s}`;
        const body = card.querySelector('.product-body');
        if (body) body.appendChild(badge);

        // 수량이 재고 초과하면 줄이기
        if ((quantities[item.id] || 0) > s) {
          quantities[item.id] = s;
          const inp = document.getElementById('input-' + item.id);
          if (inp) inp.value = s;
        }

        // + 버튼 재고 초과 방지
        const plusBtn = card.querySelector('.qty-btn:last-child');
        if (plusBtn) {
          plusBtn.onclick = (e) => {
            e && e.stopPropagation();
            const cur = quantities[item.id] || 0;
            if (cur >= s) {
              showToast(currentLang === 'ko' ? `재고가 ${s}개뿐이에요!` : currentLang === 'th' ? `มีสินค้าเพียง ${s} ชิ้น!` : `Only ${s} in stock!`);
              return;
            }
            changeQty(item.id, 1, e);
          };
        }
      }
    }
  });
  updateSummary();
};

// renderTab 후 재고 적용
const _origRender = window.renderTab;
window.renderTab = function(tab) {
  _origRender(tab);
  if (window._stock) applyStock();
};

// Firebase에서 베스트 상품 불러오기
async function loadBestFromFirebase() {
  try {
    const snapshot = await get(ref(db, 'best'));
    const data = snapshot.val();

      bestIds = data;
      renderBest();
    }

    console.log('베스트 상품 로드 실패:', e);
  }
}

loadStock();

// ===== 주문 폼 자동저장 =====
// 모달이 열릴 때 저장된 값 불러오기
const _origOpenModal = window.openModal || openModal;
function openModal() {
  _origOpenModal();
  setTimeout(function() {
    try {
      var n = localStorage.getItem('cf_name');
      var p = localStorage.getItem('cf_phone');
      var f = localStorage.getItem('cf_facebook');
      var img = localStorage.getItem('cf_addr_img');
      if (n) { var el = document.getElementById('cust-name'); if(el) el.value = n; }
      if (p) { var el = document.getElementById('cust-phone'); if(el) el.value = p; }
      if (f) { var el = document.getElementById('cust-facebook'); if(el) el.value = f; }
      if (img) {
        var imgEl = document.getElementById('addr-img');
        var preEl = document.getElementById('addr-preview');
        var phEl = document.getElementById('addr-placeholder');
        if (imgEl && preEl && phEl) {
          imgEl.src = img;
          preEl.style.display = 'block';
          phEl.style.display = 'none';
          fetch(img).then(function(r){ return r.blob(); }).then(function(blob){
            window._savedAddrFile = new File([blob], 'address.jpg', {type: blob.type});
          }).catch(function(){});
        }
      }
    } catch(e) {}
  }, 100);
}

// 입력 시 자동저장 (event delegation)
document.addEventListener('input', function(e) {
  try {
    if (e.target.id === 'cust-name') localStorage.setItem('cf_name', e.target.value);
    if (e.target.id === 'cust-phone') localStorage.setItem('cf_phone', e.target.value);
    if (e.target.id === 'cust-facebook') localStorage.setItem('cf_facebook', e.target.value);
  } catch(ex) {}
});

// 주소 이미지 저장
var _origPreviewAddr = previewAddr;
function previewAddr(input) {
  _origPreviewAddr(input);
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try { localStorage.setItem('cf_addr_img', e.target.result); } catch(ex) {}
  };
  reader.readAsDataURL(file);
}

// 주문 시 저장된 이미지 사용
var _origConfirmOrder = confirmOrder;
function confirmOrder() {
  if (!window._savedAddrFile) {
    var img = localStorage.getItem('cf_addr_img');
    if (img) {
      try {
        var arr = img.split(','), mime = arr[0].match(/:(.*?);/)[1];
        var bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
        while(n--){ u8arr[n] = bstr.charCodeAt(n); }
        window._savedAddrFile = new File([u8arr], 'address.jpg', {type: mime});
      } catch(e) {}
    }
  }
  _origConfirmOrder();
}
</script>
